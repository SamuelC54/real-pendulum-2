syntax = "proto3";

package sensor.v1;

// Arduino / USB-serial test hardware (LED toggle, etc.).
service SensorService {
  rpc Connect(ConnectRequest) returns (ConnectReply);
  rpc Disconnect(DisconnectRequest) returns (DisconnectReply);
  rpc ToggleLed(ToggleLedRequest) returns (ToggleLedReply);
  rpc GetStatus(GetStatusRequest) returns (GetStatusReply);
  rpc SubscribeStatus(SubscribeStatusRequest) returns (stream GetStatusReply);
  rpc ListSerialPorts(ListSerialPortsRequest) returns (ListSerialPortsReply);
  rpc ResetEncoder(ResetEncoderRequest) returns (ResetEncoderReply);
}

// If serial_port is empty, physical-sensor-service falls back to SENSOR_SERIAL_PORT.
message ConnectRequest {
  string serial_port = 1;
}

message ConnectReply {
  bool ok = 1;
  string error_message = 2;
}

message DisconnectRequest {}

message DisconnectReply {
  bool ok = 1;
  string error_message = 2;
}

message ToggleLedRequest {}

message ToggleLedReply {
  bool ok = 1;
  string error_message = 2;
  bool led_on = 3;
}

message GetStatusRequest {}

message SubscribeStatusRequest {}

message ListSerialPortsRequest {}

message SerialPortInfo {
  string path = 1;
  string manufacturer = 2;
  string serial_number = 3;
  string friendly_name = 4;
}

message ListSerialPortsReply {
  repeated SerialPortInfo ports = 1;
}

message GetStatusReply {
  bool connected = 1;
  bool led_on = 2;
  string detail = 3;
  string serial_port = 4;
  // Quadrature tick counter from the Arduino (e.g. Gray-code ISR on pins 2 & 3).
  sint32 encoder_ticks = 5;
  // Limit switches: INPUT_PULLUP, active when pin reads LOW (switch to GND).
  bool limit_left_pressed = 6;
  bool limit_right_pressed = 7;
}

message ResetEncoderRequest {}

message ResetEncoderReply {
  bool ok = 1;
  string error_message = 2;
  sint32 encoder_ticks = 3;
}
