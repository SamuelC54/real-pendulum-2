syntax = "proto3";

package motor.v1;

// Motor control service (ClearPath / Teknic node behind this implementation).
service MotorService {
  // Call after the process starts to open the hub and enable the node (was automatic at startup).
  rpc Connect(ConnectRequest) returns (ConnectReply);
  rpc Disconnect(DisconnectRequest) returns (DisconnectReply);
  rpc SetJogVelocity(SetJogVelocityRequest) returns (SetJogVelocityReply);
  rpc Stop(StopRequest) returns (StopReply);
  rpc GetStatus(GetStatusRequest) returns (GetStatusReply);
  // Teknic Motion.MovePosnStart(counts, absolute=true) — absolute move to commanded counts (same frame as measured_position).
  rpc MoveToPosition(MoveToPositionRequest) returns (MoveToPositionReply);
  // Teknic Motion.PosnMeasured / AddToPosition — shaft position in drive counts (see ClearView docs).
  rpc ZeroMeasuredPosition(ZeroMeasuredPositionRequest) returns (ZeroMeasuredPositionReply);
}

message ConnectRequest {}

message ConnectReply {
  bool ok = 1;
  string error_message = 2;
}

message DisconnectRequest {}

message DisconnectReply {
  bool ok = 1;
  string error_message = 2;
}

message SetJogVelocityRequest {
  double rpm = 1;
}

message SetJogVelocityReply {
  bool ok = 1;
  string error_message = 2;
}

message StopRequest {}

message StopReply {
  bool ok = 1;
  string error_message = 2;
}

message GetStatusRequest {}

// Teknic IInfo fields — same family of data as SCNetworkReport (node scan).
message MotorInfo {
  int32 node_index = 1;
  int32 node_type_code = 2;
  string node_type_label = 3;
  string user_id = 4;
  string firmware_version = 5;
  uint64 serial_number = 6;
  string model = 7;
}

message GetStatusReply {
  bool connected = 1;
  double commanded_rpm = 2;
  string detail = 3;
  MotorInfo motor = 4;
  // Present when connected and readable: Motion.PosnMeasured (counts along the rail axis).
  optional double measured_position = 5;
}

message MoveToPositionRequest {
  // Absolute target in Teknic Motion counts (same frame as measured_position).
  double position_counts = 1;
  // Caps Motion.VelLimit (RPM) for this profile move. Omit or non-positive to use compile-time default.
  optional double max_velocity_rpm = 2;
  // Caps Motion.AccLimit with AccUnit RPM_PER_SEC. Omit or non-positive to use compile-time default.
  optional double max_acceleration_rpm_per_sec = 3;
}

message MoveToPositionReply {
  bool ok = 1;
  string error_message = 2;
}

message ZeroMeasuredPositionRequest {}

message ZeroMeasuredPositionReply {
  bool ok = 1;
  string error_message = 2;
}
